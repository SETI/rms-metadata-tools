provider: gcp

gcp:
  job_id: parallel-addition-job
  max_runtime: 10
  project_id: rms-metadata
  service_account:          rms-metadata-tools-154@rms-metadata.iam.gserviceaccount.com
  region: us-central1
  max_instances:            10
  startup_script: |
    apt-get update -y
    apt-get install -y python3 python3-pip python3-venv git
    cd /root
    git clone https://github.com/SETI/rms-cloud-tasks.git
    cd rms-cloud-tasks
    python3 -m venv venv
    source venv/bin/activate
    pip install -e .
    pip install -r examples/parallel_addition/requirements.txt
    export ADDITION_OUTPUT_DIR=gs://rms-metadata-jspitale/addition-results
    export ADDITION_TASK_DELAY=1
    python3 examples/parallel_addition/worker_addition.py
