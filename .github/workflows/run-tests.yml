name: Run Tests
run-name: Run Tests triggered by ${{ github.ref_type }} ${{ github.ref_name }} or ${{ github.triggering_actor }}

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: "21 11 * * 0"

jobs:
  lint:
    name: Lint rms-metadata-tools
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"

      - name: Ruff (lint)
        run: |
          ruff check src tests

      - name: Ruff (format)
        run: |
          ruff format --check src tests

      - name: Mypy
        run: |
          mypy src tests

      - name: Sphinx
        run: |
          sphinx-build -W -b html docs docs/_build

      - name: PyMarkdown
        run: |
          pymarkdown scan docs/ .cursor/ README.md CONTRIBUTING.md

  test:
    name: Test rms-metadata-tools
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
      fail-fast: false
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"

      - name: Test with coverage
        run: |
          python -m pytest --cov=src --cov-report=xml -n auto tests

      - name: Print coverage report
        run: |
          coverage report -m

      - name: Upload coverage report to codecov
        uses: codecov/codecov-action@v6
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && !github.event.pull_request.head.repo.fork
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
